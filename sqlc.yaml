version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/db/queries/"
    schema: "internal/db/migrations/"
    gen:
      go:
        package: "dbgen"
        out: "internal/db/generated"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_methods_with_db_argument: false
