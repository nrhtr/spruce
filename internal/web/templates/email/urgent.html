<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Darkly Alert</title></head>
<body style="font-family:system-ui,-apple-system,sans-serif;max-width:600px;margin:0 auto;color:#1f2937;padding:16px;">
  <div style="background:#dc2626;color:#fff;padding:16px 24px;border-radius:8px 8px 0 0;">
    <h1 style="margin:0;font-size:20px;font-weight:700;">⚠ Darkly Alert</h1>
    <p style="margin:4px 0 0;color:#fca5a5;font-size:13px;">Auctions ending soon — action required</p>
  </div>
  <div style="background:#fff;border:1px solid #fecaca;border-top:none;padding:24px;border-radius:0 0 8px 8px;">

  {{range .Listings}}
  <div style="border:1px solid #fecaca;border-radius:8px;padding:14px;margin-bottom:10px;background:#fff7f7;">
    <a href="{{.URL}}" style="font-weight:600;color:#4f46e5;text-decoration:none;font-size:15px;">{{.Title}}</a>
    <div style="color:#6b7280;font-size:12px;margin-top:4px;">
      {{.Platform}}{{if .Location}} · {{.Location}}{{end}}
    </div>
    <div style="display:flex;gap:16px;margin-top:10px;align-items:center;">
      {{if .Price}}<div style="font-weight:700;color:#059669;font-size:16px;">{{.Price}}</div>{{end}}
      <div style="font-weight:700;color:#dc2626;font-size:13px;">Ends {{.EndTime}}</div>
    </div>
  </div>
  {{end}}

  <hr style="border:none;border-top:1px solid #e5e7eb;margin:20px 0;">
  <p style="font-size:11px;color:#9ca3af;text-align:center;">Darkly · You have not placed a bid on these items</p>
  </div>
</body>
</html>
