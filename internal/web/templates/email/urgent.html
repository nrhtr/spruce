<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spruce Alert</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #fef2f2; color: #1f2937; padding: 24px 16px; }
    .wrap { max-width: 600px; margin: 0 auto; }
    .header { background: #dc2626; color: #fff; padding: 20px 28px; border-radius: 10px 10px 0 0; }
    .header h1 { font-size: 20px; font-weight: 800; }
    .header p { margin-top: 4px; color: #fca5a5; font-size: 13px; }
    .body { background: #fff; border: 1px solid #fecaca; border-top: none; padding: 28px; border-radius: 0 0 10px 10px; }
    .card { border: 1px solid #fecaca; border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; background: #fff7f7; }
    .card-title { font-size: 15px; font-weight: 600; color: #4f46e5; text-decoration: none; }
    .card-title:hover { text-decoration: underline; }
    .card-meta { color: #6b7280; font-size: 12px; margin-top: 4px; }
    .card-row { display: flex; gap: 20px; align-items: center; margin-top: 12px; }
    .card-price { font-size: 18px; font-weight: 800; color: #059669; }
    .card-end { font-size: 13px; font-weight: 700; color: #dc2626; }
    .spruce-link { display: inline-block; margin-top: 6px; font-size: 11px; color: #9ca3af; text-decoration: none; }
    .divider { border: none; border-top: 1px solid #fee2e2; margin: 24px 0; }
    .footer { font-size: 11px; color: #d1d5db; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>⚠ Spruce Alert</h1>
      <p>Auctions ending soon — action required</p>
    </div>
    <div class="body">

      {{range .Listings}}
      <div class="card">
        <a href="{{.URL}}" class="card-title">{{.Title}}</a>
        <p class="card-meta">{{.Platform}}{{if .Location}} · {{.Location}}{{end}}</p>
        <div class="card-row">
          {{if .Price}}<div class="card-price">{{.Price}}</div>{{end}}
          <div class="card-end">Ends {{.EndTime}}</div>
        </div>
        {{if .SpruceURL}}<a href="{{.SpruceURL}}" class="spruce-link">View in Spruce →</a>{{end}}
      </div>
      {{end}}

      <hr class="divider">
      <p class="footer">Spruce · you have not placed a bid on these items</p>
    </div>
  </div>
</body>
</html>
